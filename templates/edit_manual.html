{% extends "base.html" %}
{% block content %}
<div class="content-section">
    <!-- Your form code here -->
     <form method="POST" action="">
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Edit Manual</legend>
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" class="form-control" value="{{ manual.title }}">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control">{{ manual.description }}</textarea>
            </div>
        </fieldset>
        <div class="form-group">
            <button type="submit" class="btn btn-outline-info">Update Manual</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('main.super_admin_dashboard') }}">Cancel</a>
        </div>
    </form>
</div>
    
</div>
{% endblock content %}
