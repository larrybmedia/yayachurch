{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 rounded-lg">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>Schedule Platform Event</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('main.create_event') }}">
                        
                        <div class="form-group mb-3">
                            <label class="form-label fw-bold">Event Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g., Youth Excellence Summit" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 form-group mb-3">
                                <label class="form-label fw-bold">Date & Time</label>
                                <input type="datetime-local" name="event_date" class="form-control" required>
                            </div>
                            <div class="col-md-6 form-group mb-3">
                                <label class="form-label fw-bold">Venue Location</label>
                                <input type="text" name="location" class="form-control" placeholder="Defaults to 'Main Auditorium' if blank">
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label fw-bold">Event Scope</label>
                            <div class="custom-control custom-checkbox border p-2 rounded">
                                <input type="checkbox" name="is_global" value="true" id="isGlobalCheck">
                                <label for="isGlobalCheck" class="text-muted small ms-1">Mark as Global Event (Visible to all nationwide branches)</label>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label fw-bold">Program Description</label>
                            <textarea name="description" class="form-control" rows="5" placeholder="Provide detailed guidelines, themes, and guest speaker notes..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('main.super_admin') }}" class="btn btn-light px-4">Cancel</a>
                            <button type="submit" class="btn btn-success px-5 font-weight-bold">Publish Event</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
