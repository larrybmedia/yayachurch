{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Edit Branch 🏢</h3>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Branch Name</label>
                            <!-- Pre-filled with the current name -->
                            <input type="text" name="name" class="form-control" value="{{ branch.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <!-- Pre-filled with the current location -->
                            <input type="text" name="location" class="form-control" value="{{ branch.location }}" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Update Branch</button>
                            <a href="{{ url_for('main.super_admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
