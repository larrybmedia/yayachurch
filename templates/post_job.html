{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Post Global Job 🌍</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <!-- JOB TITLE -->
                        <div class="form-group mb-3">
                            <label>Job Title</label>
                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   placeholder="e.g. Youth Media Manager"
                                   required>
                        </div>

                        <!-- COMPANY -->
                        <div class="form-group mb-3">
                            <label>Company</label>
                            <input type="text"
                                   name="company"
                                   class="form-control"
                                   placeholder="e.g. Best Vision Enterprises"
                                   required>
                        </div>

                        <!-- DESCRIPTION -->
                        <div class="form-group mb-3">
                            <label>Description</label>
                            <textarea name="description"
                                      rows="6"
                                      class="form-control"
                                      placeholder="Write full job details..."
                                      required></textarea>
                        </div>

                        <!-- SUBMIT -->
                        <button type="submit" class="btn btn-success btn-block">
                            <i class="fas fa-plus-circle"></i>
                            Post Job
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
