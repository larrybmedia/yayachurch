<div class="container mt-5">
    <h3>Manage Church Bank Details</h3>
    <form action="{{ url_for('main.update_bank') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="row">
            <div class="col-md-4">
                <label>Category</label>
                <select name="category" class="form-control" required>
                    <option value="Tithe">Tithe & Offering</option>
                    <option value="Project">Special Projects</option>
                </select>
            </div>
            <div class="col-md-4">
                <label>Bank Name</label>
                <input type="text" name="bank_name" class="form-control" placeholder="e.g. Zenith Bank" required>
            </div>
            <div class="col-md-4">
                <label>Account Number</label>
                <input type="text" name="account_number" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-success mt-3">Save Bank Details</button>
    </form>
</div>
