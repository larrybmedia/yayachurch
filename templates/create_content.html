{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="row">

        <!-- ================= ANNOUNCEMENT ================= -->
        <div class="col-md-6">

            <div class="card p-3 shadow-sm">

                <h4>Create Announcement 📝</h4>

                <form method="POST" action="{{ url_for('main.create_post') }}">

                    <input type="text"
                           name="title"
                           class="form-control mb-2"
                           placeholder="Announcement Title"
                           required>

                    <textarea name="content"
                              class="form-control mb-2"
                              placeholder="Write announcement..."
                              required></textarea>

                    <!-- IMPORTANT: tells backend it's a post -->
                    <input type="hidden" name="type" value="post">

                    <button type="submit" class="btn btn-primary w-100">
                        Publish Post
                    </button>

                </form>

            </div>

        </div>

        <!-- ================= JOB POST ================= -->
        <div class="col-md-6">

            <div class="card p-3 shadow-sm">

                <h4>Post Job 💼</h4>

                <form method="POST" action="{{ url_for('main.create_job') }}">

                    <input type="text"
                           name="title"
                           class="form-control mb-2"
                           placeholder="Job Title"
                           required>

                    <input type="text"
                           name="company"
                           class="form-control mb-2"
                           placeholder="Company Name"
                           required>

                    <textarea name="description"
                              class="form-control mb-2"
                              placeholder="Job Description"
                              required></textarea>

                    <select name="is_global" class="form-control mb-2">

                        <option value="1">Global Job 🌍</option>
                        <option value="0">Local Job 📍</option>

                    </select>

                    <button type="submit" class="btn btn-success w-100">
                        Post Job
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
